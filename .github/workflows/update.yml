name: Daily Stock Data Update

on:
  schedule:
    # 毎週月〜金 16:10 JST (= 07:10 UTC)
    - cron: '10 7 * * 1-5'
  workflow_dispatch:
    # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: Asia/Tokyo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stock_data.json
          git diff --staged --quiet && echo "No changes" || (
            git commit -m "Update stock data: $(TZ=Asia/Tokyo date +'%Y-%m-%d')"
            git push
          )
