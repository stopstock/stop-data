name: Deploy to Cloudflare

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Daily Stock Data Update"]
    types: [completed]

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Prepare public dir
        run: |
          mkdir -p public
          rsync -a ./ public/ \
            --exclude .git --exclude .github \
            --exclude '*.py' --exclude requirements.txt \
            --exclude run_scraper.bat --exclude run_scraper.ps1 \
            --exclude README.md --exclude wrangler.toml \
            --exclude worker.js --exclude public

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 035926d851c17dfd9cf096e0884cd474
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN not set; skipping."
            exit 0
          fi
          npx wrangler@4 deploy